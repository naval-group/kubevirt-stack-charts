apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostpath-provisioner-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: hostpath-provisioner
    prometheus.hostpathprovisioner.kubevirt.io: "true"
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      name: hostpath-provisioner-operator
  template:
    metadata:
      labels:
        name: hostpath-provisioner-operator
        app: hostpath-provisioner
        np.kubevirt.io/allow-access-cluster-services: "true"
        prometheus.hostpathprovisioner.kubevirt.io: "true"
    spec:
      serviceAccountName: hostpath-provisioner-operator
      containers:
        - name: hostpath-provisioner-operator
          image: {{ include "kubevirt-stack.image" (dict "repository" .Values.operator.image.repository "tag" .Values.version "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          command:
            - hostpath-provisioner-operator
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: INSTALLER_PART_OF_LABEL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/part-of']
            - name: INSTALLER_VERSION_LABEL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: OPERATOR_NAME
              value: hostpath-provisioner-operator
            - name: OPERATOR_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" .Values.operator.image.repository "tag" .Values.version "global" .Values.global) }}
            - name: PROVISIONER_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "quay.io/kubevirt/hostpath-provisioner" "tag" .Values.version "global" .Values.global) }}
            - name: CSI_PROVISIONER_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "quay.io/kubevirt/hostpath-csi-driver" "tag" .Values.version "global" .Values.global) }}
            - name: NODE_DRIVER_REG_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "registry.k8s.io/sig-storage/csi-node-driver-registrar" "tag" "v2.2.0" "global" .Values.global) }}
            - name: LIVENESS_PROBE_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "registry.k8s.io/sig-storage/livenessprobe" "tag" "v2.3.0" "global" .Values.global) }}
            - name: CSI_SNAPSHOT_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "registry.k8s.io/sig-storage/csi-snapshotter" "tag" "v8.2.0" "global" .Values.global) }}
            - name: CSI_SIG_STORAGE_PROVISIONER_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "registry.k8s.io/sig-storage/csi-provisioner" "tag" "v3.4.1" "global" .Values.global) }}
            - name: VERBOSITY
              value: "3"
            - name: MONITORING_NAMESPACE
              value: ""
          ports:
            - containerPort: 8443
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6060
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /livez
              port: 6060
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 1
          resources:
            requests:
              cpu: 10m
              memory: 150Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: apiservice-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
      nodeSelector:
        {{- include "kubevirt-stack.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.operator.nodeSelector) | nindent 8 }}
      {{- $tolerations := include "kubevirt-stack.tolerations" (dict "global" .Values.global.tolerations "local" .Values.operator.tolerations) -}}
      {{- if $tolerations }}
      tolerations:
        {{- $tolerations | nindent 8 }}
      {{- end }}
      volumes:
        - name: apiservice-cert
          secret:
            secretName: hostpath-provisioner-operator-webhook-service-cert
            defaultMode: 420
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key

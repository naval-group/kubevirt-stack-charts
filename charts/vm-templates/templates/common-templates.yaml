{{- if .Values.vmTemplates.enabled }}
---
apiVersion: template.kubevirt.io/v1alpha1
kind: VirtualMachineTemplate
metadata:
  name: fedora-server
  namespace: {{ include "kubevirt-stack.namespace" . }}
  labels:
    os.template.kubevirt.io/fedora: "true"
    workload.template.kubevirt.io/server: "true"
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
  annotations:
    description: "Fedora Server VM template"
    iconClass: icon-fedora
spec:
  message: "VM ${VM_NAME} created with ${MEMORY} memory. Login: fedora / ${PASSWORD}"
  parameters:
    - name: VM_NAME
      displayName: VM Name
      description: "Name for the virtual machine"
      required: true
    - name: CPU_CORES
      displayName: CPU Cores
      description: "Number of CPU cores"
      value: "2"
    - name: MEMORY
      displayName: Memory
      description: "Memory allocation (e.g. 1Gi, 2Gi)"
      value: "4Gi"
    - name: DISK_SIZE
      displayName: Disk Size
      description: "Size of the root disk"
      value: "30Gi"
    - name: PASSWORD
      displayName: Password
      description: "Login password"
      from: "[a-zA-Z0-9]{12}"
      generate: expression
  virtualMachine:
    apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: ${VM_NAME}
    spec:
      runStrategy: Always
      template:
        metadata:
          labels:
            kubevirt.io/domain: ${VM_NAME}
        spec:
          domain:
            cpu:
              cores: {{ `"${{CPU_CORES}}"` }}
            resources:
              requests:
                memory: ${MEMORY}
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
              rng: {}
            features:
              acpi: {}
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: ${VM_NAME}-rootdisk
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  hostname: ${VM_NAME}
                  password: ${PASSWORD}
                  chpasswd:
                    expire: false
      dataVolumeTemplates:
        - metadata:
            name: ${VM_NAME}-rootdisk
          spec:
            storage:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: ${DISK_SIZE}
            source:
              registry:
                url: docker://quay.io/containerdisks/fedora:latest
---

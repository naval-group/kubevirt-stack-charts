apiVersion: template.kubevirt.io/v1alpha1
kind: VirtualMachineTemplate
metadata:
  name: windows-desktop
  namespace: {{ include "kubevirt-stack.namespace" . }}
  labels:
    os.template.kubevirt.io/windows: "true"
    workload.template.kubevirt.io/desktop: "true"
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
  annotations:
    description: "Windows Desktop VM template (bring your own ISO)"
    iconClass: icon-windows
spec:
  message: "VM ${VM_NAME} created. Attach your Windows ISO PVC to complete installation."
  parameters:
    - name: VM_NAME
      displayName: VM Name
      description: "Name for the virtual machine"
      required: true
    - name: CPU_CORES
      displayName: CPU Cores
      description: "Number of CPU cores"
      value: "4"
    - name: MEMORY
      displayName: Memory
      description: "Memory allocation (e.g. 1Gi, 2Gi)"
      value: "8Gi"
    - name: DISK_SIZE
      displayName: Disk Size
      description: "Size of the root disk"
      value: "60Gi"
    - name: ISO_PVC
      displayName: Windows ISO PVC
      description: "Name of PVC containing Windows ISO"
      required: true
  virtualMachine:
    apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: ${VM_NAME}
    spec:
      runStrategy: Manual
      template:
        metadata:
          labels:
            kubevirt.io/domain: ${VM_NAME}
        spec:
          domain:
            cpu:
              cores: {{ `"${{CPU_CORES}}"` }}
            resources:
              requests:
                memory: ${MEMORY}
            clock:
              utc: {}
              timer:
                hpet:
                  present: false
                pit:
                  tickPolicy: delay
                rtc:
                  tickPolicy: catchup
                hyperv: {}
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: sata
                - name: iso
                  cdrom:
                    bus: sata
                - name: virtiocontainerdisk
                  cdrom:
                    bus: sata
              interfaces:
                - name: default
                  masquerade: {}
              tpm: {}
              inputs:
                - type: tablet
                  bus: usb
                  name: tablet
            features:
              acpi: {}
              hyperv:
                relaxed: {}
                vapic: {}
                spinlocks:
                  spinlocks: 8191
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: ${VM_NAME}-rootdisk
            - name: iso
              persistentVolumeClaim:
                claimName: ${ISO_PVC}
            - name: virtiocontainerdisk
              containerDisk:
                image: quay.io/kubevirt/virtio-container-disk:latest
      dataVolumeTemplates:
        - metadata:
            name: ${VM_NAME}-rootdisk
          spec:
            storage:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: ${DISK_SIZE}
            source:
              blank: {}
{{- end }}

{{- if .Values.vmTemplates.enabled }}
---
apiVersion: template.kubevirt.io/v1alpha1
kind: VirtualMachineTemplate
metadata:
  name: fedora-server
  namespace: {{ .Values.vmTemplates.namespace | default .Values.global.kubevirtNamespace | default "kubevirt" }}
  labels:
    os.template.kubevirt.io/fedora: "true"
    workload.template.kubevirt.io/server: "true"
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
  annotations:
    description: "Fedora Server VM template"
    iconClass: icon-fedora
spec:
  parameters:
    - name: NAME
      description: "Name of the VirtualMachine"
      required: true
    - name: DISK_SIZE
      description: "Size of the root disk"
      value: "30Gi"
    - name: CPU_CORES
      description: "Number of CPU cores"
      value: "2"
    - name: MEMORY
      description: "Amount of memory"
      value: "4Gi"
  objects:
    - apiVersion: kubevirt.io/v1
      kind: VirtualMachine
      metadata:
        name: ${NAME}
        labels:
          app: ${NAME}
          kubevirt.io/os: linux
      spec:
        running: false
        template:
          metadata:
            labels:
              kubevirt.io/domain: ${NAME}
          spec:
            domain:
              cpu:
                cores: {{ `"${{CPU_CORES}}"` }}
              memory:
                guest: ${MEMORY}
              devices:
                disks:
                  - name: rootdisk
                    disk:
                      bus: virtio
                  - name: cloudinitdisk
                    disk:
                      bus: virtio
                interfaces:
                  - name: default
                    masquerade: {}
                rng: {}
              features:
                acpi: {}
            networks:
              - name: default
                pod: {}
            volumes:
              - name: rootdisk
                dataVolume:
                  name: ${NAME}-rootdisk
              - name: cloudinitdisk
                cloudInitNoCloud:
                  userData: |
                    #cloud-config
                    hostname: ${NAME}
        dataVolumeTemplates:
          - metadata:
              name: ${NAME}-rootdisk
            spec:
              storage:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: ${DISK_SIZE}
              source:
                registry:
                  url: docker://quay.io/containerdisks/fedora:latest
---

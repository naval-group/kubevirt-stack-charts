{{- if .Values.uploadProxy.externalMode.enabled }}
{{- if not (.Capabilities.APIVersions.Has "cert-manager.io/v1") }}
{{- fail "cert-manager.io/v1 CRDs not found. Install cert-manager before enabling uploadProxy.externalMode." }}
{{- end }}
{{- if not .Values.uploadProxy.externalMode.hostname }}
{{- fail "uploadProxy.externalMode.hostname is required when uploadProxy.externalMode.enabled is true" }}
{{- end }}
{{- if not .Values.uploadProxy.externalMode.ingressClassName }}
{{- fail "uploadProxy.externalMode.ingressClassName is required when uploadProxy.externalMode.enabled is true" }}
{{- end }}
{{- if not .Values.uploadProxy.externalMode.certManager.issuerRef }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cdi-uploadproxy-selfsigned
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cdi-uploadproxy-external
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  secretName: cdi-uploadproxy-external-tls
  {{- if .Values.uploadProxy.externalMode.certManager.issuerRef }}
  issuerRef:
    {{- toYaml .Values.uploadProxy.externalMode.certManager.issuerRef | nindent 4 }}
  {{- else }}
  issuerRef:
    name: cdi-uploadproxy-selfsigned
    kind: Issuer
  {{- end }}
  dnsNames:
    - {{ .Values.uploadProxy.externalMode.hostname }}
  duration: 8760h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cdi-uploadproxy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: {{ .Values.uploadProxy.externalMode.ingressClassName }}
  rules:
    - host: {{ .Values.uploadProxy.externalMode.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cdi-uploadproxy
                port:
                  number: 443
  tls:
    - hosts:
        - {{ .Values.uploadProxy.externalMode.hostname }}
      secretName: cdi-uploadproxy-external-tls
{{- end }}

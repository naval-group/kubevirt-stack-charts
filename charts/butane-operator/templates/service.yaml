---
apiVersion: v1
kind: Service
metadata:
  name: butane-operator-controller-manager-metrics-service
  namespace: {{ .Values.namespace }}
  labels:
    app: butane-operator
    control-plane: controller-manager
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: https
  selector:
    control-plane: controller-manager
---
apiVersion: v1
kind: Service
metadata:
  name: butane-operator-webhook-service
  namespace: {{ .Values.namespace }}
  labels:
    app: butane-operator
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    control-plane: controller-manager

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaq-operator
  namespace: {{ .Values.namespace }}
  labels:
    aaq.kubevirt.io: aaq-operator
    name: aaq-operator
    operator.aaq.kubevirt.io: ""
    prometheus.aaq.kubevirt.io: "true"
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      name: aaq-operator
      operator.aaq.kubevirt.io: ""
  strategy: {}
  template:
    metadata:
      labels:
        aaq.kubevirt.io: aaq-operator
        name: aaq-operator
        operator.aaq.kubevirt.io: ""
        prometheus.aaq.kubevirt.io: "true"
    spec:
      serviceAccountName: aaq-operator
      containers:
        - name: aaq-operator
          image: {{ include "kubevirt-stack.image" (dict "repository" .Values.operator.image.repository "tag" .Values.version "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          args:
            - -v=1
          env:
            - name: DEPLOY_CLUSTER_RESOURCES
              value: "true"
            - name: OPERATOR_VERSION
              value: {{ .Values.version }}
            - name: CONTROLLER_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "quay.io/kubevirt/aaq-controller" "tag" .Values.version "global" .Values.global) }}
            - name: AAQ_SERVER_IMAGE
              value: {{ include "kubevirt-stack.image" (dict "repository" "quay.io/kubevirt/aaq-server" "tag" .Values.version "global" .Values.global) }}
            - name: VERBOSITY
              value: "1"
            - name: PULL_POLICY
              value: IfNotPresent
            - name: MONITORING_NAMESPACE
          ports:
            - containerPort: 8443
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
          {{- with .Values.operator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePolicy: FallbackToLogsOnError
      nodeSelector:
        {{- include "kubevirt-stack.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.operator.nodeSelector) | nindent 8 }}
      securityContext:
        runAsNonRoot: true
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        {{- $extra := include "kubevirt-stack.tolerations" (dict "global" .Values.global.tolerations "local" .Values.operator.tolerations) -}}
        {{- if $extra }}
        {{- $extra | nindent 8 }}
        {{- end }}

{{- if not (.Capabilities.APIVersions.Has "cert-manager.io/v1") }}
{{- fail (printf "cert-manager.io/v1 CRDs not found. Install cert-manager before installing %s." .Chart.Name) }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kubemacpool-selfsigned
  namespace: {{ .Values.namespace }}
  labels:
    app: kubemacpool
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kubemacpool-service
  namespace: {{ .Values.namespace }}
  labels:
    app: kubemacpool
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  secretName: kubemacpool-service
  issuerRef:
    name: kubemacpool-selfsigned
    kind: Issuer
  dnsNames:
    - kubemacpool-service.{{ .Values.namespace }}.svc
    - kubemacpool-service.{{ .Values.namespace }}.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: kubemacpool-service
  namespace: {{ .Values.namespace }}
  labels:
    app: kubemacpool
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      targetPort: 8000
      protocol: TCP
  selector:
    control-plane: mac-controller-manager
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kubemacpool-mutator
  labels:
    app: kubemacpool
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/kubemacpool-service
webhooks:
  - name: mutatepods.kubemacpool.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: kubemacpool-service
        namespace: {{ .Values.namespace }}
        path: /mutate-pods
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: mutatepods.kubemacpool.io
          operator: In
          values:
            - allocate
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
    sideEffects: NoneOnDryRun
  - name: mutatevirtualmachines.kubemacpool.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: kubemacpool-service
        namespace: {{ .Values.namespace }}
        path: /mutate-virtualmachines
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: mutatevirtualmachines.kubemacpool.io
          operator: NotIn
          values:
            - ignore
    rules:
      - apiGroups:
          - kubevirt.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - virtualmachines
    sideEffects: NoneOnDryRun

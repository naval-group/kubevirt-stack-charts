apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemacpool-mac-controller-manager
  namespace: {{ .Values.namespace }}
  labels:
    app: kubemacpool
    control-plane: mac-controller-manager
    {{- include "kubevirt-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: mac-controller-manager
  template:
    metadata:
      labels:
        app: kubemacpool
        control-plane: mac-controller-manager
    spec:
      serviceAccountName: kubemacpool
      priorityClassName: system-cluster-critical
      terminationGracePeriodSeconds: 5
      containers:
        - name: manager
          image: {{ include "kubevirt-stack.image" (dict "repository" .Values.image.repository "tag" .Values.image.tag "global" .Values.global) }}
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --v=1
            - --wait-time=300
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RANGE_START
              value: {{ .Values.rangeStart | quote }}
            - name: RANGE_END
              value: {{ .Values.rangeEnd | quote }}
            - name: KUBEVIRT_CLIENT_GO_SCHEME_REGISTRATION_VERSION
              value: v1
          ports:
            - containerPort: 8000
              name: webhook-server
              protocol: TCP
            - containerPort: 8443
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              httpHeaders:
                - name: Content-Type
                  value: application/json
              path: /readyz
              port: webhook-server
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - name: tls-key-pair
              mountPath: /tmp/k8s-webhook-server/serving-certs/
              readOnly: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 107
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        {{- include "kubevirt-stack.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.nodeSelector) | nindent 8 }}
      {{- $tolerations := include "kubevirt-stack.tolerations" (dict "global" .Values.global.tolerations "local" .Values.tolerations) -}}
      {{- if $tolerations }}
      tolerations:
        {{- $tolerations | nindent 8 }}
      {{- end }}
      volumes:
        - name: tls-key-pair
          secret:
            secretName: kubemacpool-service

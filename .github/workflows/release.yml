name: Release Charts

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  detect-changes:
    name: Detect changed charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.changed.outputs.charts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Find changed charts since previous tag
        id: changed
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            # First release — all charts
            echo "First release, packaging all charts"
            CHANGED=$(ls -d charts/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            echo "Comparing $PREV_TAG -> ${{ github.ref_name }}"
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- charts/ | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          echo "charts=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed charts: $CHANGED"

  release:
    name: Package & Push
    needs: detect-changes
    if: needs.detect-changes.outputs.charts != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect-changes.outputs.charts) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v4.2.0

      - name: Get chart name and version
        id: chart
        run: |
          NAME=$(grep '^name:' charts/${{ matrix.chart }}/Chart.yaml | awk '{print $2}' | tr -d '"')
          VERSION=$(grep '^version:' charts/${{ matrix.chart }}/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: helm package charts/${{ matrix.chart }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push to OCI (GHCR)
        run: |
          helm push ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/kubevirt-stack-charts

      - name: Push Artifact Hub metadata
        run: |
          curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz oras
          echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io \
            --username "${{ github.actor }}" --password-stdin
          ./oras push \
            ghcr.io/${{ github.repository_owner }}/kubevirt-stack-charts/${{ steps.chart.outputs.name }}:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            charts/${{ matrix.chart }}/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}.tgz

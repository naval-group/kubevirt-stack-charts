name: Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v4.2.0

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            echo "=== Linting $(basename $chart) ==="
            helm lint "$chart" || exit 1
          done

      - name: Template all charts (standalone)
        run: |
          for chart in charts/*/; do
            name=$(basename "$chart")
            echo "=== Templating $name ==="
            helm template test "$chart" \
              --kube-version 1.30.0 \
              --api-versions cert-manager.io/v1 \
              --api-versions monitoring.coreos.com/v1 \
              > /dev/null || exit 1
          done

      - name: Validate schemas
        run: |
          for schema in charts/*/values.schema.json; do
            echo "=== Validating $(dirname $schema | xargs basename) schema ==="
            python3 -c "import json; json.load(open('$schema')); print('  Valid JSON')"
          done
